version: '3.9'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: muniprioritise_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: muniprioritise
      POSTGRES_USER: muni_user
      POSTGRES_PASSWORD: muni_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U muni_user -d muniprioritise']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: muniprioritise_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@muniprioritise.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
